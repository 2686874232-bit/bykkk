<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datacore</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }

        :root {
            --foreground: #ffffff;
            --muted-foreground: #a1a1aa;
            --primary: #3b82f6;
            --accent: #06b6d4;
            --border: rgba(255,255,255,0.1);
            --secondary: rgba(255,255,255,0.05);
        }

        body {
            color: var(--foreground);
            overflow-x: hidden;
            /* 关键：让body撑满全屏 */
            min-height: 100vh;
            position: relative;
        }

        /* 【核心修复】全屏视频背景 */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            opacity: 0.4;
            z-index: -1;
        }

        /* 网格遮罩 */
        .gradient-grid {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
            pointer-events: none;
        }

        /* 顶部光晕 */
        .glow-top {
            position: fixed;
            left: 50%;
            top: 0;
            height: 600px;
            width: 800px;
            transform: translateX(-50%) translateY(-30%);
            border-radius: 999px;
            background: rgba(59, 130, 246, 0.15);
            filter: blur(128px);
            z-index: 2;
            pointer-events: none;
        }

        /* 导航栏 */
        nav {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .nav-links a {
            color: var(--muted-foreground);
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: var(--foreground);
        }

        .nav-buttons {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-text {
            color: var(--muted-foreground);
            background: transparent;
            border: none;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-text:hover {
            color: var(--foreground);
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary:hover { transform: scale(1.05); }
        .btn-primary:active { transform: scale(0.95); }

        /* 主内容 */
        main {
            position: relative;
            z-index: 10;
            min-height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
            text-align: center;
        }

        h1 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            line-height: 1.1;
            max-width: 4xl;
        }

        .gradient-text {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .desc {
            margin-top: 24px;
            max-width: 2xl;
            color: var(--muted-foreground);
            font-size: 16px;
        }

        .btn-secondary {
            margin-top: 40px;
            padding: 14px 24px;
            border: 1px solid var(--border);
            background: var(--secondary);
            color: var(--foreground);
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }

        .btn-secondary:hover { transform: scale(1.05); }
        .btn-secondary:active { transform: scale(0.95); }

        /* 卡片区域 */
        .card-wrap {
            width: 100%;
            max-width: 4xl;
            margin: 64px auto 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
        }

        .glass-card {
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            text-align: left;
            transition: 0.2s;
            background: rgba(0,0,0,0.3);
        }

        .glass-card:hover {
            border-color: rgba(59,130,246,0.2);
            background: rgba(59,130,246,0.03);
        }

        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(59,130,246,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
        }

        .card-desc {
            font-size: 12px;
            color: var(--muted-foreground);
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <!-- 全屏视频背景 -->
    <video class="video-bg" autoplay loop muted playsinline>
        <source src="./videos/hero-bg.mp4" type="video/mp4">
    </video>

    <!-- 网格遮罩 -->
    <div class="gradient-grid"></div>

    <!-- 顶部光晕 -->
    <div class="glow-top"></div>

    <!-- 导航栏 -->
    <nav>
        <div class="nav-left">
            <div class="logo">
                <div class="logo-icon">Z</div>
                <span class="font-bold text-lg">Datacore</span>
            </div>
            <div class="nav-links">
                <a href=" ">唱</a >
                <a href="#">跳</a >
                <a href="#">rap</a >
                <a href="#">篮球</a >
            </div>
        </div>
        <div class="nav-buttons">
            <button class="btn-text">登录</button>
            <button class="btn-primary">立即开始</button>
        </div>
    </nav>

    <!-- 主体内容 -->
    <main>
        <h1>
            欢迎来到，
            <br>
            <span class="gradient-text">不要坤坤坤</span>
        </h1>
        <p class="desc">是守护最好的坤坤</p >

        <button class="btn-secondary">立即开始使用</button>

        <!-- 功能卡片 -->
        <div class="card-wrap">
            <div class="glass-card">
                <div class="card-icon">🛡️</div>
                <h3 class="card-title">全民制作人</h3>
                <p class="card-desc">你一票我一票</p >
            </div>
            <div class="glass-card">
                <div class="card-icon">📊</div>
                <h3 class="card-title">ikun</h3>
                <p class="card-desc">偶像练习生</p >
            </div>
            <div class="glass-card">
                <div class="card-icon">🌐</div>
                <h3 class="card-title">小黑子</h3>
                <p class="card-desc">鸡你太美</p >
            </div>
        </div>
    </main>

    <script>
        // 视频加载失败时的备用背景
        const video = document.querySelector('.video-bg');
        video.addEventListener('error', () => {
            document.body.style.background = '#070709 url(https://wallpaperaccess.com/full/3123332.jpg) center/cover';
        });
    </script>
</body>
</html>
