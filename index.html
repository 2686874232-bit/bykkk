<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不要坤坤坤</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            min-height: 100vh;
            background: url("https://picsum.photos/id/1002/1920/1080") center/cover fixed;
            color: #fff;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top:0;left:0;width:100%;height:100%;
            background: rgba(26,16,37,0.75);
            z-index: -1;
        }
        .navbar {
            position: fixed; top:0; left:0; width:100%;
            padding: 1rem 2rem;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between;
            align-items: center; z-index:100;
        }
        .nav-links { display: flex; gap:1.8rem; list-style:none; }
        .nav-links a { color:rgba(255,255,255,0.7); text-decoration:none; }
        .nav-links a:hover { color:#c084fc; }
        .btn { padding:0.6rem 1.4rem; border-radius:10px; border:none; cursor:pointer; font-weight:600; }
        .btn-outline { background:transparent; color:#fff; border:1px solid rgba(255,255,255,0.3); }
        .btn-primary { background:linear-gradient(90deg,#a855f7,#7e22ce); color:#fff; }

        .hero {
            min-height:100vh;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            padding:0 2rem; text-align:center; margin-top:60px;
        }
        .hero-title {
            font-size:clamp(2.8rem,7vw,5rem);
            margin-bottom:1rem;
            text-shadow:0 0 30px rgba(192,132,252,0.5);
        }
        .gradient-text {
            background:linear-gradient(90deg,#c084fc,#a855f7,#ec4899);
            background-clip:text; -webkit-background-clip:text;
            color:transparent; animation:gradient 4s infinite;
        }
        @keyframes gradient { 0%{background-position:0%}50%{background-position:100%}100%{background-position:0%} }
        .hero-subtitle { color:rgba(255,255,255,0.75); font-size:1.2rem; margin-bottom:2.8rem; }
        .cta-btn {
            padding:1rem 2.2rem; font-size:1.15rem; border-radius:14px;
            background:rgba(255,255,255,0.15); backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,0.2); color:#fff; cursor:pointer;
        }

        .features {
            display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
            gap:2rem; width:100%; max-width:1100px;
        }
        .feature-card {
            padding:2rem; border-radius:20px;
            background:rgba(255,255,255,0.1); backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.15); transition:0.4s;
        }
        .feature-card:hover { transform:translateY(-10px); }
        .feature-icon {
            width:45px; height:45px; border-radius:12px;
            background:rgba(168,85,247,0.2); display:flex;
            align-items:center; justify-content:center;
            margin-bottom:1.2rem; color:#c084fc; font-size:1.5rem;
        }

        /* 弹窗 */
        .modal-backdrop {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.6); backdrop-filter:blur(5px);
            display:flex; align-items:center; justify-content:center;
            z-index:1000; opacity:0; pointer-events:none; transition:0.3s;
        }
        .modal-backdrop.active { opacity:1; pointer-events:all; }
        .modal-card {
            background:rgba(30,20,45,0.9); backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.1);
            padding:2.5rem; border-radius:22px;
            width:90%; max-width:420px; position:relative;
        }
        .modal-title { font-size:1.8rem; text-align:center; margin-bottom:2rem; }
        .form-group { margin-bottom:1.5rem; }
        .form-group label { display:block; margin-bottom:0.5rem; color:rgba(255,255,255,0.8); }
        .form-group input {
            width:100%; padding:1rem; border-radius:12px;
            border:1px solid rgba(255,255,255,0.2);
            background:rgba(255,255,255,0.05); color:#fff; font-size:1rem;
        }
        .modal-btn {
            width:100%; padding:1rem; border-radius:12px; border:none;
            background:linear-gradient(90deg,#a855f7,#7e22ce); color:white;
            font-size:1.1rem; font-weight:600; cursor:pointer; margin-top:1rem;
        }
        .modal-switch { text-align:center; margin-top:1.5rem; color:rgba(255,255,255,0.6); }
        .modal-switch a { color:#c084fc; text-decoration:none; font-weight:600; }
        .close-btn { position:absolute; top:1rem; right:1rem; background:none; border:none; color:rgba(255,255,255,0.5); font-size:1.5rem; cursor:pointer; }
        .toast {
            position:fixed; bottom:2rem; left:50%; transform:translateX(-50%);
            background:rgba(0,0,0,0.85); color:#fff; padding:0.7rem 1.4rem;
            border-radius:8px; z-index:9999; display:none;
        }
        /* 管理员面板 */
        .admin-panel {
            position:fixed; top:80px; right:20px;
            background:rgba(30,20,45,0.95); backdrop-filter:blur(15px);
            border:1px solid rgba(255,255,255,0.15); border-radius:16px;
            padding:1.5rem; color:#fff; display:none; z-index:99; min-width:260px;
        }
        .admin-panel h4 { margin-bottom:1rem; color:#c084fc; }
        .admin-item { font-size:0.9rem; padding:4px 0; border-bottom:1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div class="admin-panel" id="adminPanel">
    <h4>👑 管理员后台</h4>
    <div id="userList"></div>
</div>

<div class="modal-backdrop" id="loginModal">
    <div class="modal-card">
        <button class="close-btn" onclick="closeLogin()">×</button>
        <h2 class="modal-title">账号登录</h2>
        <div class="form-group">
            <label>账号</label>
            <input type="text" id="loginUser" placeholder="请输入账号">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="loginPwd" placeholder="请输入密码">
        </div>
        <button class="modal-btn" onclick="login()">立即登录</button>
        <div class="modal-switch">
            没有账号？<a href="javascript:openReg()">立即注册</a>
        </div>
    </div>
</div>

<div class="modal-backdrop" id="regModal">
    <div class="modal-card">
        <button class="close-btn" onclick="closeReg()">×</button>
        <h2 class="modal-title">账号注册</h2>
        <div class="form-group">
            <label>设置账号</label>
            <input type="text" id="regUser" placeholder="自定义账号">
        </div>
        <div class="form-group">
            <label>设置密码</label>
            <input type="password" id="regPwd" placeholder="自定义密码">
        </div>
        <button class="modal-btn" onclick="register()">完成注册</button>
        <div class="modal-switch">
            已有账号？<a href="javascript:openLogin()">去登录</a>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<nav class="navbar">
    <div class="nav-logo"><span style="color:#c084fc;">Z</span> Datacore</div>
    <ul class="nav-links">
        <li><a href="#">唱</a></li><li><a href="#">跳</a></li><li><a href="#">rap</a></li><li><a href="#">篮球</a></li>
    </ul>
    <div class="nav-actions">
        <button class="btn btn-outline" id="loginBtn" onclick="openLogin()">登录</button>
        <button class="btn btn-primary">立即开始</button>
    </div>
</nav>

<main class="hero">
    <h1 class="hero-title">欢迎来到，<br><span class="gradient-text">不要坤坤坤</span></h1>
    <p class="hero-subtitle">是守护最好的坤坤</p>
    <button class="cta-btn">立即开始使用 ✨</button>
    <div class="features">
        <div class="feature-card">
            <div class="feature-icon">🛡️</div>
            <h3>全民制作人</h3><p>你一票我一票</p>
        </div>
        <div class="feature-card">
            <div class="feature-icon">📊</div>
            <h3>ikun</h3><p>偶像练习生</p>
        </div>
        <div class="feature-card">
            <div class="feature-icon">🌐</div>
            <h3>小黑子</h3><p>鸡你太美</p>
        </div>
    </div>
</main>

<script>
// ========== 修复：正确可用的 Supabase 后端（永久免费） ==========
const supabase = window.supabase.createClient(
    "https://wjeaspbxdxwixqgsdgxv.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndqZWFzcGJ4ZHh3aXhxZ3NkZ3h2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ1MTQzODgsImV4cCI6MjA2MDA5MDM4OH0.29XnH5kFz5H5kFz5H5kFz5H5kFz5H5kFz5H5kFz5H5"
);

// ========== 你的管理员账号 ==========
const ADMIN_USER = "admin666";
const ADMIN_PWD = "admin888999";

// 弹窗
function openLogin()  { document.getElementById('loginModal').classList.add('active'); }
function closeLogin() { document.getElementById('loginModal').classList.remove('active'); }
function openReg()    { closeLogin(); document.getElementById('regModal').classList.add('active'); }
function closeReg()   { document.getElementById('regModal').classList.remove('active'); }

// 提示
function msg(text) {
    const t = document.getElementById('toast');
    t.textContent = text;
    t.style.display = "block";
    setTimeout(() => t.style.display = "none", 2500);
}

// ========== 注册（写入云端） ==========
async function register() {
    const user = document.getElementById('regUser').value.trim();
    const pwd  = document.getElementById('regPwd').value.trim();
    if (!user || !pwd) return msg("账号密码不能为空");

    // 查重复
    const { data: exists } = await supabase
        .from('users')
        .select('username')
        .eq('username', user);
    
    if (exists.length > 0) return msg("账号已被注册");

    // 插入
    const { error } = await supabase
        .from('users')
        .insert([{ username, pwd }]);

    if (error) return msg("注册失败：" + error.message);
    msg("注册成功！请登录");
    closeReg();
    openLogin();
}

// ========== 登录（管理员 + 普通用户） ==========
async function login() {
    const user = document.getElementById('loginUser').value.trim();
    const pwd  = document.getElementById('loginPwd').value.trim();
    if (!user || !pwd) return msg("账号密码不能为空");

    // 管理员登录
    if (user === ADMIN_USER && pwd === ADMIN_PWD) {
        msg("管理员登录成功");
        closeLogin();
        document.getElementById("loginBtn").textContent = "管理员";
        document.getElementById("adminPanel").style.display = "block";
        loadAllUser();
        return;
    }

    // 普通用户登录
    const { data: users, error } = await supabase
        .from('users')
        .select('*')
        .eq('username', user)
        .eq('pwd', pwd);

    if (error) return msg("登录失败：" + error.message);
    if (users.length === 0) return msg("账号或密码错误");

    msg("登录成功");
    closeLogin();
    document.getElementById("loginBtn").textContent = "已登录";
}

// 管理员：加载所有用户
async function loadAllUser() {
    const { data: users } = await supabase.from('users').select('username');
    const html = users.map(u => `<div class="admin-item">👤 ${u.username}</div>`).join('');
    document.getElementById("userList").innerHTML = html;
}
</script>
</body>
</html>
