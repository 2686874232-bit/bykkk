<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>不要坤坤坤</title>
  <style>
    /* 全局重置 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* 紫暗色背景+遮罩 */
    body {
      min-height: 100vh;
      background: url("https://picsum.photos/id/1002/1920/1080") center/cover no-repeat fixed;
      color: #ffffff;
      overflow-x: hidden;
      position: relative;
    }
    /* 紫暗色半透明遮罩，压暗画面 */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(26, 16, 37, 0.7);
      z-index: -1;
    }

    /* 导航栏 - 毛玻璃适配紫暗色 */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      z-index: 100;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      font-size: 1.1rem;
    }
    .nav-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }
    .nav-links a {
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      transition: color 0.3s ease;
    }
    .nav-links a:hover {
      color: #fff;
    }
    .nav-actions {
      display: flex;
      gap: 1rem;
    }
    .btn {
      padding: 0.5rem 1.25rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.3s ease;
    }
    .btn-outline {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .btn-primary {
      background: linear-gradient(90deg, #8b5cf6 0%, #6366f1 100%);
      color: #fff;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
    }

    /* 主内容区 */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 2rem;
      text-align: center;
    }
    .hero-title {
      font-size: clamp(2.5rem, 6vw, 4rem);
      line-height: 1.2;
      margin-bottom: 1rem;
      text-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
    }
    /* 紫蓝渐变文字 */
    .gradient-text {
      background: linear-gradient(90deg, #8b5cf6 0%, #6366f1 50%, #ec4899 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: gradient-shift 3s ease infinite;
    }
    @keyframes gradient-shift {
      0% { background-position: 0% center; }
      50% { background-position: 100% center; }
      100% { background-position: 0% center; }
    }
    .hero-subtitle {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.1rem;
      margin-bottom: 2.5rem;
    }
    .cta-btn {
      padding: 0.875rem 2rem;
      font-size: 1.1rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .cta-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
    }

    /* 功能卡片区 - 适配紫暗色 */
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      width: 100%;
      max-width: 1000px;
      margin-top: 4rem;
    }
    .feature-card {
      padding: 1.75rem;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .feature-card:hover {
      transform: translateY(-8px);
      background: rgba(255, 255, 255, 0.22);
      border-color: rgba(255, 255, 255, 0.35);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
    }
    .feature-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(139, 92, 246, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      color: #8b5cf6;
      transition: all 0.3s ease;
    }
    .feature-card:hover .feature-icon {
      background: rgba(139, 92, 246, 0.4);
      transform: scale(1.1);
    }
    .feature-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #ffffff;
    }
    .feature-desc {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.9rem;
    }

    /* 响应式适配 */
    @media (max-width: 768px) {
      .navbar {
        padding: 1rem;
      }
      .nav-links {
        display: none;
      }
      .features {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-logo">
      <span style="color: #8b5cf6;">Z</span> Datacore
    </div>
    <ul class="nav-links">
      <li><a href=" ">唱</a ></li>
      <li><a href="#">跳</a ></li>
      <li><a href="#">rap</a ></li>
      <li><a href="#">篮球</a ></li>
    </ul>
    <div class="nav-actions">
      <button class="btn btn-outline">登录</button>
      <button class="btn btn-primary">立即开始</button>
    </div>
  </nav>

  <!-- 主内容区 -->
  <main class="hero">
    <h1 class="hero-title">
      欢迎来到，<br>
      <span class="gradient-text">不要坤坤坤</span>
    </h1>
    <p class="hero-subtitle">是守护最好的坤坤</p >
    <button class="cta-btn">立即开始使用 ✨</button>

    <!-- 功能卡片 -->
    <div class="features">
      <div class="feature-card">
        <div class="feature-icon">🛡️</div>
        <h3 class="feature-title">全民制作人</h3>
        <p class="feature-desc">你一票我一票</p >
      </div>
      <div class="feature-card">
        <div class="feature-icon">📊</div>
        <h3 class="feature-title">ikun</h3>
        <p class="feature-desc">偶像练习生</p >
      </div>
      <div class="feature-card">
        <div class="feature-icon">🌐</div>
        <h3 class="feature-title">小黑子</h3>
        <p class="feature-desc">鸡你太美</p >
      </div>
    </div>
  </main>
</body>
</html>
