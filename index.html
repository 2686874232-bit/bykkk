<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不要坤坤坤</title>
    <!-- 引入免费云端后端数据库 BaaS -->
    <script src="https://cdn.jsdelivr.net/npm/leancloud-storage@4.15.0/dist/av-min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: url("https://picsum.photos/id/1002/1920/1080") center/cover no-repeat fixed;
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 16, 37, 0.75);
            z-index: -1;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
            font-size: 1.2rem;
            color: #fff;
        }
        .nav-links {
            display: flex;
            gap: 1.8rem;
            list-style: none;
        }
        .nav-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: color 0.3s ease;
            font-weight: 500;
        }
        .nav-links a:hover {
            color: #c084fc;
        }
        .nav-actions {
            display: flex;
            gap: 1rem;
        }
        .btn {
            padding: 0.6rem 1.4rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-outline {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .btn-primary {
            background: linear-gradient(90deg, #a855f7, #7e22ce);
            color: #fff;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.6);
        }

        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 2rem;
            text-align: center;
            margin-top: 60px;
        }
        .hero-title {
            font-size: clamp(2.8rem, 7vw, 5rem);
            line-height: 1.15;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(192, 132, 252, 0.5);
        }
        .gradient-text {
            background: linear-gradient(90deg, #c084fc, #a855f7, #ec4899);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradient-shift 4s ease infinite;
        }
        @keyframes gradient-shift {
            0% { background-position: 0% center; }
            50% { background-position: 100% center; }
            100% { background-position: 0% center; }
        }
        .hero-subtitle {
            color: rgba(255, 255, 255, 0.75);
            font-size: 1.2rem;
            margin-bottom: 2.8rem;
            letter-spacing: 1px;
        }
        .cta-btn {
            padding: 1rem 2.2rem;
            font-size: 1.15rem;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 5rem;
        }
        .cta-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1100px;
        }
        .feature-card {
            padding: 2rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.4s ease;
            cursor: pointer;
            text-align: left;
        }
        .feature-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.35);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
        }
        .feature-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: rgba(168, 85, 247, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.2rem;
            color: #c084fc;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }
        .feature-card:hover .feature-icon {
            background: rgba(168, 85, 247, 0.4);
            transform: scale(1.1);
        }
        .feature-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }
        .feature-desc {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .navbar { padding: 1rem; }
            .nav-links { display: none; }
            .features { grid-template-columns: 1fr; gap: 1.5rem; }
            .hero-title { font-size: 2.5rem; }
        }

        /* 登录注册弹窗 */
        .modal-backdrop {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-backdrop.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal-card {
            background: rgba(30, 20, 45, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 22px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }
        .modal-backdrop.active .modal-card {
            transform: translateY(0);
        }
        .modal-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-align: center;
            color: #fff;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: rgba(255,255,255,0.8);
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #a855f7;
            background: rgba255,255,255,0.1;
        }
        .modal-btn {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: none;
            background: linear-gradient(90deg, #a855f7, #7e22ce);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        .modal-switch {
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(255,255,255,0.6);
        }
        .modal-switch a {
            color: #c084fc;
            text-decoration: none;
            font-weight: 600;
        }
        .close-btn {
            position: absolute;
            top: 1rem; right: 1rem;
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: 1.5rem;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 0.7rem 1.4rem;
            border-radius: 8px;
            z-index: 9999;
            display: none;
        }
    </style>
</head>
<body>

<!-- 登录弹窗 -->
<div class="modal-backdrop" id="loginModal">
    <div class="modal-card">
        <button class="close-btn" onclick="closeLogin()">×</button>
        <h2 class="modal-title">账号登录</h2>
        <div class="form-group">
            <label>账号</label>
            <input type="text" id="loginUser" placeholder="请输入账号">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="loginPwd" placeholder="请输入密码">
        </div>
        <button class="modal-btn" onclick="login()">立即登录</button>
        <div class="modal-switch">
            没有账号？<a href=" ">立即注册</a >
        </div>
    </div>
</div>

<!-- 注册弹窗 -->
<div class="modal-backdrop" id="regModal">
    <div class="modal-card">
        <button class="close-btn" onclick="closeReg()">×</button>
        <h2 class="modal-title">账号注册</h2>
        <div class="form-group">
            <label>设置账号</label>
            <input type="text" id="regUser" placeholder="自定义账号">
        </div>
        <div class="form-group">
            <label>设置密码</label>
            <input type="password" id="regPwd" placeholder="自定义密码">
        </div>
        <button class="modal-btn" onclick="register()">完成注册</button>
        <div class="modal-switch">
            已有账号？<a href="javascript:openLogin()">去登录</a >
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<!-- 导航 -->
<nav class="navbar">
    <div class="nav-logo">
        <span style="color: #c084fc;">Z</span> Datacore
    </div>
    <ul class="nav-links">
        <li><a href="#">唱</a ></li>
        <li><a href="#">跳</a ></li>
        <li><a href="#">rap</a ></li>
        <li><a href="#">篮球</a ></li>
    </ul>
    <div class="nav-actions">
        <button class="btn btn-outline" id="loginBtn" onclick="openLogin()">登录</button>
        <button class="btn btn-primary">立即开始</button>
    </div>
</nav>

<main class="hero">
    <h1 class="hero-title">
        欢迎来到，<br>
        <span class="gradient-text">不要坤坤坤</span>
    </h1>
    <p class="hero-subtitle">是守护最好的坤坤</p >
    <button class="cta-btn">立即开始使用 ✨</button>

    <div class="features">
        <div class="feature-card">
            <div class="feature-icon">🛡️</div>
            <h3 class="feature-title">全民制作人</h3>
            <p class="feature-desc">你一票我一票</p >
        </div>
        <div class="feature-card">
            <div class="feature-icon">📊</div>
            <h3 class="feature-title">ikun</h3>
            <p class="feature-desc">偶像练习生</p >
        </div>
        <div class="feature-card">
            <div class="feature-icon">🌐</div>
            <h3 class="feature-title">小黑子</h3>
            <p class="feature-desc">鸡你太美</p >
        </div>
    </div>
</main>

<script>
// 初始化云端后端数据库（免费公共后端）
AV.init({
  appId: "v0N1kF9cL5aR2jDmH7sX9bQw1eT",
  appKey: "8zP2xQ7dR4aF9gK6jL3sC5vB1nM",
  serverURL: "https://xxx.leancloud.app"
});

const UserDB = AV.Object.extend("UserList");

// 弹窗控制
function openLogin(){
    document.getElementById('loginModal').classList.add('active');
}
function closeLogin(){
    document.getElementById('loginModal').classList.remove('active');
}
function openReg(){
    closeLogin();
    document.getElementById('regModal').classList.add('active');
}
function closeReg(){
    document.getElementById('regModal').classList.remove('active');
}

// 提示框
function msg(text){
    let t = document.getElementById('toast');
    t.innerText = text;
    t.style.display = "block";
    setTimeout(()=>{t.style.display="none"},2000);
}

// 注册 - 写入云端后端数据库
function register(){
    let user = document.getElementById('regUser').value.trim();
    let pwd = document.getElementById('regPwd').value.trim();
    if(!user || !pwd) return msg("账号密码不能为空");

    let query = new AV.Query(UserDB);
    query.equalTo("username", user);
    query.find().then(res=>{
        if(res.length>0){
            msg("该账号已被注册");
        }else{
            let newUser = new UserDB();
            newUser.set("username",user);
            newUser.set("password",pwd);
            newUser.save().then(()=>{
                msg("注册成功！请登录");
                closeReg();
                openLogin();
            })
        }
    })
}

// 登录 - 验证云端后端数据库
function login(){
    let user = document.getElementById('loginUser').value.trim();
    let pwd = document.getElementById('loginPwd').value.trim();
    if(!user || !pwd) return msg("账号密码不能为空");

    let query = new AV.Query(UserDB);
    query.equalTo("username",user);
    query.find().then(res=>{
        if(res.length<=0) return msg("账号不存在");
        if(res[0].get("password") === pwd){
            msg("登录成功");
            closeLogin();
            document.getElementById("loginBtn").innerText = "已登录";
        }else{
            msg("密码错误");
        }
    })
}
</script>

</body>
</html>
